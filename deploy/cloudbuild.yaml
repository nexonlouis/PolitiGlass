# Build with NEXT_PUBLIC_* available at compile time, then deploy to Cloud Run.
#
# Usage (set substitutions to your values):
#   gcloud builds submit --config deploy/cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_SERVICE=politiglass,_SUPABASE_URL=https://xxx.supabase.co,_SUPABASE_ANON_KEY=eyJ...
#
# Server-only secrets (SUPABASE_SERVICE_ROLE_KEY, CONGRESS_GOV_API_KEY) are
# mounted at deploy/runtime via --set-secrets on the deploy step below.

substitutions:
  _REGION: us-central1
  _SERVICE: politiglass
  _SUPABASE_URL: ""
  _SUPABASE_ANON_KEY: ""

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_URL=${_SUPABASE_URL}
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${_SUPABASE_ANON_KEY}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/politiglass/${_SERVICE}:$BUILD_ID
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/politiglass/${_SERVICE}:$BUILD_ID

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/politiglass/${_SERVICE}:$BUILD_ID
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --no-invoker-iam-check
      - --port
      - "8080"
      - --memory
      - 512Mi
      - --set-secrets=SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,CONGRESS_GOV_API_KEY=CONGRESS_GOV_API_KEY:latest
      - --set-env-vars=CONGRESS_NUMBER=119,POLITIGLASS_DEMO_MODE=false

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/politiglass/${_SERVICE}:$BUILD_ID

options:
  logging: CLOUD_LOGGING_ONLY
